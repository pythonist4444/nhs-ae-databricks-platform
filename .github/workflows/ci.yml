name: dbt CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dbt:
    name: dbt ${{ github.event_name == 'pull_request' && 'test' || 'build' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dbt/nhs_ae

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt-fabric
        run: pip install dbt-fabric

      - name: Install dbt packages
        run: dbt deps

      - name: dbt debug (confirm connection)
        env:
          FABRIC_SERVER: ${{ secrets.FABRIC_SERVER }}
          FABRIC_DATABASE: ${{ secrets.FABRIC_DATABASE }}
        run: dbt debug

      - name: dbt test (on PR)
        if: github.event_name == 'pull_request'
        env:
          FABRIC_SERVER: ${{ secrets.FABRIC_SERVER }}
          FABRIC_DATABASE: ${{ secrets.FABRIC_DATABASE }}
        run: dbt test

      - name: dbt build (on merge to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          FABRIC_SERVER: ${{ secrets.FABRIC_SERVER }}
          FABRIC_DATABASE: ${{ secrets.FABRIC_DATABASE }}
        run: dbt build
